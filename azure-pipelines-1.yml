trigger:
- '*'

stages:
- stage: Build
  displayName: 'Build stage'
  jobs:
  - job: BuildJob
    displayName: 'Build on self-hosted agent'
    pool:
      name: PRO690
      demands:
      - Agent.Name -equals AOMAR22-VM
    steps:
    - script: |
        echo "Building application..."
        echo "Agent Name: $(Agent.Name)"
        echo "Agent OS: $(Agent.OS)"
      displayName: 'Build and show agent info'

- stage: Test
  displayName: 'Test stage'
  dependsOn: Build
  condition: succeeded('Build')
  jobs:
  - job: TestJob
    displayName: 'Test on self-hosted agent'
    pool:
      name: PRO690
      demands:
      - Agent.Name -equals AOMAR22-VM
    steps:
    - script: |
        echo "Running tests..."
        echo "Tests completed successfully."
        echo "Agent Name: $(Agent.Name)"
      displayName: 'Run tests and show agent info'

- stage: Deploy
  displayName: 'Deploy stage'
  dependsOn: Test
  condition: succeeded('Test')

  jobs:
  - deployment: DeployJob
    displayName: 'Deploy on Microsoft-hosted agent'
    environment: deploy-approval

    pool:
      vmImage: 'ubuntu-22.04'

    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              echo "Deploying application..."
              echo "Agent Name: $(Agent.Name)"
              echo "Agent OS: $(Agent.OS)"
              echo "Deployment completed successfully."
            displayName: 'Deploy and show agent'